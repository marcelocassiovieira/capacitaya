services:
  - type: web
    name: capacity-ar-api
    runtime: python
    nixPackages:
      - nodejs
    buildCommand: >-
      pip install -r requirements.txt &&
      cd frontend/artifacts/capacitaya &&
      npm install &&
      PORT=3000 BASE_PATH=/ npm run build &&
      cd ../..
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: DATABASE_URL
        sync: false
