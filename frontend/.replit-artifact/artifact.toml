kind = "web"
previewPath = "/capacitaya/"
title = "CapacitaYa — Capacitación & IA"
version = "1.0.0"
id = "artifacts/capacitaya"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/capacitaya/" ]
localPort = 24895

[services.development]
run = "pnpm --filter @workspace/capacitaya run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/capacitaya", "run", "build" ]
publicDir = "artifacts/capacitaya/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24895"
BASE_PATH = "/capacitaya/"
