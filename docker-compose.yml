services:
  web:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    command: fastapi dev --app app --host 0.0.0.0
  db:
    image: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: capacity_ar
    ports:
      - "5432:5432"