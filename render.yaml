services:
  - type: web
    name: capacity-ar-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: DATABASE_URL
        fromDatabase:
          name: capacity-ar-db
          property: connectionString

databases:
  - name: capacity-ar-db
    databaseName: capacity_ar
    user: capacity_ar
