services:
  web:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    command: fastapi dev --app app --host 0.0.0.0
  db:
    image: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: capacity_ar
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  dbadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@capacitaya.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "8888:80"
    volumes:
      - pgadmin:/var/lib/pgadmin
volumes:
  pgdata:
  pgadmin:
    